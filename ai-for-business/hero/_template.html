<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} | AIM AI Bootcamp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../../assets/css/global.css" />
  <link rel="stylesheet" href="../../assets/css/city-theme.css" />

  <style>html.light-pending body{background:#f4f5f9!important}body{padding-bottom:4rem!important}
</style>
<script>try{if(document.cookie.indexOf('cos_ai_reset=1')!==-1){for(var _ri=localStorage.length-1;_ri>=0;_ri--){var _rk=localStorage.key(_ri);if(_rk&&_rk.indexOf('cos_ai_')===0)localStorage.removeItem(_rk);}document.cookie='cos_ai_reset=;path=/;max-age=0';}}catch(e){}</script>
<script>try{if(localStorage.getItem('cos_ai_theme')==='light')document.documentElement.classList.add('light-pending')}catch(e){}</script>
</head>
<body>

  <nav class="aim-nav fixed top-0 left-0 right-0 z-50 py-5">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <a href="https://www.aim.com.au" target="_blank"><img src="../../assets/aimlogo_white.png" alt="AIM" class="h-8 sm:h-10"></a>
      <a href="../index.html" class="aim-back">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back to Course
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
        <svg class="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- ═══════ HERO APP CANVAS ═══════ -->
  <div id="hero-app" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;">
    <canvas id="hero-canvas" style="width:100%;height:100%;display:block;"></canvas>
  </div>

  <!-- ═══════ UI OVERLAY ═══════ -->
  <main class="relative z-10 max-w-4xl mx-auto px-6 pt-28 pb-20">
    <div class="pill mb-6 fade-up"><span class="w-2 h-2 rounded-full bg-[#a78bfa] inline-block"></span> Interactive Lesson</div>
    <h1 class="text-3xl sm:text-4xl font-bold mb-4 fade-up" style="animation-delay:100ms">
      <span class="gradient-text">{{TITLE}}</span>
    </h1>
    <p class="text-[var(--aim-text)] text-lg mb-8 fade-up" style="animation-delay:200ms">
      {{SUBTITLE}}
    </p>

    <!-- App-specific UI goes here -->
    <div id="app-ui" class="fade-up" style="animation-delay:300ms">
      <!-- Each hero app replaces this section -->
    </div>
  </main>

  <footer class="relative z-10 border-t border-[var(--aim-panel)] py-8">
    <div class="max-w-6xl mx-auto px-6 text-center text-xs text-[var(--aim-muted)]">
      AIM AI Bootcamp &mdash; Interactive Lesson
    </div>
  </footer>

  <!-- ═══════ THREE.JS (WebGPU) ═══════ -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.webgpu.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <!-- ═══════ THEME TOGGLE ═══════ -->
  <script>
  (function(){
    var KEY = 'cos_ai_theme';
    var saved = localStorage.getItem(KEY);
    if(saved === 'light') document.body.classList.add('light-mode');
    updateIcon();

    window.toggleTheme = function(){
      document.body.classList.toggle('light-mode');
      var isLight = document.body.classList.contains('light-mode');
      localStorage.setItem(KEY, isLight ? 'light' : 'dark');
      updateIcon();
    };

    function updateIcon(){
      var isLight = document.body.classList.contains('light-mode');
      document.querySelectorAll('.theme-icon-dark').forEach(function(el){ el.style.display = isLight ? 'none' : 'block'; });
      document.querySelectorAll('.theme-icon-light').forEach(function(el){ el.style.display = isLight ? 'block' : 'none'; });
    }

    if(saved === 'light' && !document.body.classList.contains('light-mode')){
      document.body.classList.add('light-mode');
    }
  })();

  lucide.createIcons();
  </script>

  <!-- ═══════ APP SCRIPT (replace per hero app) ═══════ -->
  <script type="module">
  // Each hero app imports Three.js modules here and builds the scene
  // import * as THREE from 'three';
  // import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  </script>

</body>
</html>
